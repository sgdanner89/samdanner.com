<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chore Schedule Board</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f1ea;
      color: #222;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
    }

    .top-box {
      background: white;
      border: 3px solid #222;
      padding: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 28px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 160px 120px;
      gap: 10px;
    }

    input,
    select,
    button {
      font-size: 16px;
      padding: 12px;
      border: 2px solid #222;
      background: white;
    }

    button {
      cursor: pointer;
      font-weight: bold;
      background: #ffcf5c;
    }

    .task-section {
      background: white;
      border: 3px solid #222;
      padding: 16px;
      margin-bottom: 18px;
    }

    .task-list {
      min-height: 90px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .task {
      border: 2px solid #222;
      background: #e7f0ff;
      padding: 10px 12px;
      cursor: grab;
      font-weight: bold;
      user-select: none;
    }

    .task small {
      display: block;
      font-weight: normal;
      margin-top: 4px;
    }

    .schedule {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 10px;
    }

    .day {
      min-height: 300px;
      background: white;
      border: 3px solid #222;
      padding: 10px;
    }

    .day h2 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 18px;
      border-bottom: 2px solid #222;
      padding-bottom: 8px;
    }

    .drop-zone {
      min-height: 230px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .day.drag-over {
      background: #fff4cf;
    }

    .delete {
      float: right;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: bold;
      padding: 0;
      margin-left: 8px;
    }

    @media (max-width: 900px) {
      .schedule {
        grid-template-columns: repeat(2, 1fr);
      }

      .input-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 500px) {
      .schedule {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-box">
      <h1>Enter Task</h1>
      <div class="input-row">
        <input id="taskInput" placeholder="Enter task..." />
        <select id="recurringInput">
          <option value="Yes">Recurring: Yes</option>
          <option value="No">Recurring: No</option>
        </select>
        <button onclick="addTask()">Add</button>
      </div>
    </div>

    <div class="task-section">
      <h1>Tasks</h1>
      <div id="taskList" class="task-list"></div>
    </div>

    <div id="schedule" class="schedule"></div>
  </div>

  <script>
    const days = ["Daily", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

    let tasks = JSON.parse(localStorage.getItem("simpleChoreTasks")) || [];
    let schedule = JSON.parse(localStorage.getItem("simpleChoreSchedule")) || {};

    days.forEach(day => {
      if (!schedule[day]) schedule[day] = [];
    });

    function saveData() {
      localStorage.setItem("simpleChoreTasks", JSON.stringify(tasks));
      localStorage.setItem("simpleChoreSchedule", JSON.stringify(schedule));
    }

    function addTask() {
      const input = document.getElementById("taskInput");
      const recurring = document.getElementById("recurringInput").value;

      if (!input.value.trim()) return;

      const task = {
        id: Date.now().toString(),
        name: input.value.trim(),
        recurring: recurring
      };

      tasks.push(task);
      input.value = "";
      saveData();
      render();
    }

    function renderTask(task, sourceDay = null) {
      const div = document.createElement("div");
      div.className = "task";
      div.draggable = true;
      div.dataset.id = task.id;

      div.innerHTML = `
        ${task.name}
        <button class="delete" onclick="deleteTask('${task.id}', '${sourceDay || ""}')">x</button>
        <small>Recurring: ${task.recurring}</small>
      `;

      div.addEventListener("dragstart", e => {
        e.dataTransfer.setData("taskId", task.id);
      });

      return div;
    }

    function render() {
      const taskList = document.getElementById("taskList");
      taskList.innerHTML = "";

      tasks.forEach(task => {
        taskList.appendChild(renderTask(task));
      });

      const scheduleDiv = document.getElementById("schedule");
      scheduleDiv.innerHTML = "";

      days.forEach(day => {
        const dayDiv = document.createElement("div");
        dayDiv.className = "day";

        dayDiv.innerHTML = `
          <h2>${day}</h2>
          <div class="drop-zone"></div>
        `;

        const dropZone = dayDiv.querySelector(".drop-zone");

        schedule[day].forEach(taskId => {
          const task = tasks.find(t => t.id === taskId);
          if (task) dropZone.appendChild(renderTask(task, day));
        });

        dayDiv.addEventListener("dragover", e => {
          e.preventDefault();
          dayDiv.classList.add("drag-over");
        });

        dayDiv.addEventListener("dragleave", () => {
          dayDiv.classList.remove("drag-over");
        });

        dayDiv.addEventListener("drop", e => {
          e.preventDefault();
          dayDiv.classList.remove("drag-over");

          const taskId = e.dataTransfer.getData("taskId");

          days.forEach(d => {
            schedule[d] = schedule[d].filter(id => id !== taskId);
          });

          schedule[day].push(taskId);
          saveData();
          render();
        });

        scheduleDiv.appendChild(dayDiv);
      });
    }

    function deleteTask(taskId, sourceDay) {
      if (sourceDay) {
        schedule[sourceDay] = schedule[sourceDay].filter(id => id !== taskId);
      } else {
        tasks = tasks.filter(task => task.id !== taskId);
        days.forEach(day => {
          schedule[day] = schedule[day].filter(id => id !== taskId);
        });
      }

      saveData();
      render();
    }

    render();
  </script>
</body>
</html>
