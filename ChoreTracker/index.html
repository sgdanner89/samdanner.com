<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chore Schedule Board</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f1ea;
      color: #222;
    }

    .auth-screen {
      min-height: calc(100vh - 48px);
      display: grid;
      place-items: center;
    }

    .auth-card {
      width: min(430px, 100%);
      background: white;
      border: 3px solid #222;
      padding: 22px;
      box-shadow: 10px 10px 0 #222;
    }

    .auth-card h1 { margin-top: 0; }

    .auth-card input,
    .auth-card button {
      width: 100%;
      margin-bottom: 10px;
    }

    .auth-toggle {
      background: white;
    }

    .auth-message {
      min-height: 22px;
      font-weight: bold;
      color: #b00020;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      display: none;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .user-pill {
      background: white;
      border: 3px solid #222;
      padding: 10px 12px;
      font-weight: bold;
    }

    .top-box {
      background: white;
      border: 3px solid #222;
      padding: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 28px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 160px 120px;
      gap: 10px;
    }

    input,
    select,
    button {
      font-size: 16px;
      padding: 12px;
      border: 2px solid #222;
      background: white;
    }

    button {
      cursor: pointer;
      font-weight: bold;
      background: #ffcf5c;
    }

    .task-section {
      background: white;
      border: 3px solid #222;
      padding: 16px;
      margin-bottom: 18px;
    }

    .task-list {
      min-height: 90px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .task {
      border: 2px solid #222;
      background: #e7f0ff;
      padding: 10px 12px;
      cursor: grab;
      font-weight: bold;
      user-select: none;
    }

    .task small {
      display: block;
      font-weight: normal;
      margin-top: 4px;
    }

    .schedule {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 10px;
    }

    .day {
      min-height: 300px;
      background: white;
      border: 3px solid #222;
      padding: 10px;
    }

    .day h2 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 18px;
      border-bottom: 2px solid #222;
      padding-bottom: 8px;
    }

    .drop-zone {
      min-height: 230px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .day.drag-over { background: #fff4cf; }

    .delete {
      float: right;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: bold;
      padding: 0;
      margin-left: 8px;
    }

    @media (max-width: 900px) {
      .schedule { grid-template-columns: repeat(2, 1fr); }
      .input-row { grid-template-columns: 1fr; }
      .app-header { flex-direction: column; align-items: stretch; }
    }

    @media (max-width: 500px) {
      .schedule { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <h1 id="authTitle">Sign In</h1>

      <input id="emailInput" type="email" placeholder="Email" autocomplete="email" />
      <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password" />

      <button id="authButton">Sign In</button>
      <button id="toggleAuthButton" class="auth-toggle">Create Account</button>

      <div id="authMessage" class="auth-message"></div>
    </div>
  </div>

  <div id="app" class="app">
    <div class="app-header">
      <div class="user-pill">Signed in as <span id="userEmail"></span></div>
      <button id="signOutButton">Sign Out</button>
    </div>

    <div class="top-box">
      <h1>Enter Task</h1>
      <div class="input-row">
        <input id="taskInput" placeholder="Enter task..." />
        <select id="recurringInput">
          <option value="Yes">Recurring: Yes</option>
          <option value="No">Recurring: No</option>
        </select>
        <button id="addTaskButton">Add</button>
      </div>
    </div>

    <div class="task-section">
      <h1>Tasks</h1>
      <div id="taskList" class="task-list"></div>
    </div>

    <div id="schedule" class="schedule"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDKuMY6XUp56VFszfMr7Lu7ZRXiuCWnu9Y",
      authDomain: "samdanner-7d2a6.firebaseapp.com",
      projectId: "samdanner-7d2a6",
      storageBucket: "samdanner-7d2a6.firebasestorage.app",
      messagingSenderId: "868408698259",
      appId: "1:868408698259:web:e9e40dc257368c87293466",
      measurementId: "G-5ZR9S8F03F"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);

    const days = ["Daily", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

    let createMode = false;
    let currentUser = null;
    let tasks = [];
    let schedule = {};

    const authScreen = document.getElementById("authScreen");
    const appScreen = document.getElementById("app");
    const authTitle = document.getElementById("authTitle");
    const authButton = document.getElementById("authButton");
    const toggleAuthButton = document.getElementById("toggleAuthButton");
    const authMessage = document.getElementById("authMessage");
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");

    function resetSchedule() {
      schedule = {};
      days.forEach(day => {
        schedule[day] = [];
      });
    }

    function getUserDocRef() {
      return doc(db, "users", currentUser.uid, "apps", "choreSchedule");
    }

    async function loadData() {
      resetSchedule();
      tasks = [];

      const snap = await getDoc(getUserDocRef());

      if (snap.exists()) {
        const data = snap.data();
        tasks = data.tasks || [];
        schedule = data.schedule || schedule;

        days.forEach(day => {
          if (!schedule[day]) schedule[day] = [];
        });
      } else {
        await saveData();
      }

      render();
    }

    async function saveData() {
      if (!currentUser) return;

      await setDoc(getUserDocRef(), {
        tasks,
        schedule,
        updatedAt: new Date().toISOString()
      });
    }

    async function handleAuth() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      authMessage.textContent = "";

      if (!email || !password) {
        authMessage.textContent = "Enter an email and password.";
        return;
      }

      try {
        if (createMode) {
          await createUserWithEmailAndPassword(auth, email, password);
        } else {
          await signInWithEmailAndPassword(auth, email, password);
        }
      } catch (error) {
        authMessage.textContent = error.message;
      }
    }

    function toggleAuthMode() {
      createMode = !createMode;
      authMessage.textContent = "";

      authTitle.textContent = createMode ? "Create Account" : "Sign In";
      authButton.textContent = createMode ? "Create Account" : "Sign In";
      toggleAuthButton.textContent = createMode ? "Back to Sign In" : "Create Account";
    }

    async function addTask() {
      const input = document.getElementById("taskInput");
      const recurring = document.getElementById("recurringInput").value;

      if (!input.value.trim()) return;

      const task = {
        id: crypto.randomUUID(),
        name: input.value.trim(),
        recurring
      };

      tasks.push(task);
      input.value = "";

      await saveData();
      render();
    }

    function renderTask(task, sourceDay = null) {
      const div = document.createElement("div");
      div.className = "task";
      div.draggable = true;
      div.dataset.id = task.id;

      const deleteButton = document.createElement("button");
      deleteButton.className = "delete";
      deleteButton.textContent = "x";
      deleteButton.addEventListener("click", () => deleteTask(task.id, sourceDay));

      div.append(task.name);
      div.appendChild(deleteButton);

      const small = document.createElement("small");
      small.textContent = `Recurring: ${task.recurring}`;
      div.appendChild(small);

      div.addEventListener("dragstart", e => {
        e.dataTransfer.setData("taskId", task.id);
      });

      return div;
    }

    function render() {
      const taskList = document.getElementById("taskList");
      taskList.innerHTML = "";

      tasks.forEach(task => {
        taskList.appendChild(renderTask(task));
      });

      const scheduleDiv = document.getElementById("schedule");
      scheduleDiv.innerHTML = "";

      days.forEach(day => {
        const dayDiv = document.createElement("div");
        dayDiv.className = "day";

        const heading = document.createElement("h2");
        heading.textContent = day;

        const dropZone = document.createElement("div");
        dropZone.className = "drop-zone";

        schedule[day].forEach(taskId => {
          const task = tasks.find(t => t.id === taskId);
          if (task) dropZone.appendChild(renderTask(task, day));
        });

        dayDiv.addEventListener("dragover", e => {
          e.preventDefault();
          dayDiv.classList.add("drag-over");
        });

        dayDiv.addEventListener("dragleave", () => {
          dayDiv.classList.remove("drag-over");
        });

        dayDiv.addEventListener("drop", async e => {
          e.preventDefault();
          dayDiv.classList.remove("drag-over");

          const taskId = e.dataTransfer.getData("taskId");

          days.forEach(d => {
            schedule[d] = schedule[d].filter(id => id !== taskId);
          });

          schedule[day].push(taskId);

          await saveData();
          render();
        });

        dayDiv.appendChild(heading);
        dayDiv.appendChild(dropZone);
        scheduleDiv.appendChild(dayDiv);
      });
    }

    async function deleteTask(taskId, sourceDay) {
      if (sourceDay) {
        schedule[sourceDay] = schedule[sourceDay].filter(id => id !== taskId);
      } else {
        tasks = tasks.filter(task => task.id !== taskId);
        days.forEach(day => {
          schedule[day] = schedule[day].filter(id => id !== taskId);
        });
      }

      await saveData();
      render();
    }

    authButton.addEventListener("click", handleAuth);
    toggleAuthButton.addEventListener("click", toggleAuthMode);
    document.getElementById("addTaskButton").addEventListener("click", addTask);
    document.getElementById("signOutButton").addEventListener("click", () => signOut(auth));

    passwordInput.addEventListener("keydown", e => {
      if (e.key === "Enter") handleAuth();
    });

    onAuthStateChanged(auth, async user => {
      currentUser = user;

      if (user) {
        document.getElementById("userEmail").textContent = user.email;
        authScreen.style.display = "none";
        appScreen.style.display = "block";
        await loadData();
      } else {
        tasks = [];
        resetSchedule();
        authScreen.style.display = "grid";
        appScreen.style.display = "none";
      }
    });
  </script>
</body>
</html>
