<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paycheck Budget Dashboard</title>
    <style>
        :root {
            --bg: #07111f;
            --bg2: #0c1a2d;
            --card: rgba(255, 255, 255, 0.09);
            --card-strong: rgba(255, 255, 255, 0.14);
            --border: rgba(255, 255, 255, 0.16);
            --text: #eef6ff;
            --muted: #9fb1c7;
            --green: #2ee59d;
            --blue: #60a5fa;
            --red: #ff6b6b;
            --yellow: #ffd166;
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
            --radius: 22px;
            --radius-sm: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, rgba(46, 229, 157, 0.18), transparent 35%), radial-gradient(circle at top right, rgba(96, 165, 250, 0.18), transparent 35%), linear-gradient(135deg, var(--bg), var(--bg2));
            color: var(--text);
            min-height: 100vh;
        }

        button, input, select, textarea {
            font: inherit;
        }

        .app {
            width: min(1220px, calc(100% - 28px));
            margin: 0 auto;
            padding: 28px 0 48px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            margin-bottom: 22px;
        }

        .brand h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 4.1rem);
            line-height: 0.95;
            letter-spacing: -0.06em;
        }

        .brand p {
            color: var(--muted);
            max-width: 720px;
            margin: 14px 0 0;
            font-size: 1.02rem;
        }

        .pill {
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            padding: 10px 14px;
            color: var(--muted);
            white-space: nowrap;
        }

        .shell {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            align-items: start;
        }

        .sidebar, .panel, .card, .pay-card, .notice {
            background: var(--card);
            border: 1px solid var(--border);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
            border-radius: var(--radius);
        }

        .sidebar {
            padding: 14px;
            position: sticky;
            top: 16px;
        }

        .nav-btn {
            width: 100%;
            border: 0;
            color: var(--muted);
            background: transparent;
            padding: 13px 14px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            margin: 3px 0;
            transition: 160ms ease;
            text-align: left;
        }

            .nav-btn:hover {
                background: rgba(255, 255, 255, 0.08);
                color: var(--text);
            }

            .nav-btn.active {
                color: var(--text);
                background: linear-gradient(135deg, rgba(96, 165, 250, 0.26), rgba(46, 229, 157, 0.15));
                box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
            }

        .main {
            min-width: 0;
        }

        .module {
            display: none;
            animation: fadeIn 180ms ease;
        }

            .module.active {
                display: block;
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel {
            padding: clamp(18px, 3vw, 28px);
            margin-bottom: 20px;
        }

        .module-title {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: center;
            margin-bottom: 18px;
        }

            .module-title h2 {
                margin: 0;
                font-size: clamp(1.45rem, 3vw, 2.05rem);
                letter-spacing: -0.035em;
            }

            .module-title p {
                margin: 6px 0 0;
                color: var(--muted);
            }

        .grid {
            display: grid;
            gap: 14px;
        }

        .summary-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .two {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .card {
            padding: 18px;
            box-shadow: none;
        }

        .card-label {
            color: var(--muted);
            font-size: 0.86rem;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: clamp(1.5rem, 4vw, 2.15rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            overflow-wrap: anywhere;
        }

        .positive {
            color: var(--green);
        }

        .negative {
            color: var(--red);
        }

        .blue {
            color: var(--blue);
        }

        .yellow {
            color: var(--yellow);
        }

        .muted {
            color: var(--muted);
        }

        form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin-top: 14px;
        }

        label {
            display: grid;
            gap: 7px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        input, select, textarea {
            width: 100%;
            border: 1px solid var(--border);
            background: rgba(3, 10, 20, 0.48);
            color: var(--text);
            padding: 12px 13px;
            border-radius: 14px;
            outline: none;
        }

        textarea {
            min-height: 46px;
            resize: vertical;
        }

            input:focus, select:focus, textarea:focus {
                border-color: rgba(96, 165, 250, 0.7);
                box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.12);
            }

        .full {
            grid-column: 1 / -1;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            border: 0;
            cursor: pointer;
            padding: 12px 15px;
            border-radius: 14px;
            color: #06111f;
            background: var(--green);
            font-weight: 800;
            transition: transform 140ms ease, opacity 140ms ease;
        }

            .btn:hover {
                transform: translateY(-1px);
            }

            .btn.secondary {
                background: var(--blue);
                color: #07111f;
            }

            .btn.danger {
                background: rgba(255, 107, 107, 0.16);
                color: #ffdede;
                border: 1px solid rgba(255,107,107,0.35);
            }

            .btn.ghost {
                background: rgba(255,255,255,0.08);
                color: var(--text);
                border: 1px solid var(--border);
            }

        .list {
            display: grid;
            gap: 10px;
            margin-top: 14px;
        }

        .item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
        }

            .item strong {
                display: block;
                margin-bottom: 4px;
            }

            .item small {
                color: var(--muted);
                line-height: 1.45;
            }

        .quick-links {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .quick-card {
            text-align: left;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.07);
            color: var(--text);
            padding: 18px;
            border-radius: 18px;
            cursor: pointer;
            transition: 160ms ease;
        }

            .quick-card:hover {
                transform: translateY(-2px);
                background: rgba(255,255,255,0.11);
            }

            .quick-card span {
                color: var(--muted);
                display: block;
                margin-top: 6px;
            }

        .pay-list {
            display: grid;
            gap: 16px;
        }

        .pay-card {
            padding: 18px;
            box-shadow: none;
        }

        .pay-head {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 13px;
            margin-bottom: 13px;
        }

        .money-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 10px;
        }

        .mini {
            background: rgba(255,255,255,0.055);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 14px;
            padding: 12px;
            min-width: 0;
        }

            .mini div:first-child {
                color: var(--muted);
                font-size: 0.76rem;
                margin-bottom: 5px;
            }

            .mini div:last-child {
                font-weight: 800;
                overflow-wrap: anywhere;
            }

        details {
            margin-top: 13px;
            color: var(--muted);
        }

        summary {
            cursor: pointer;
            color: var(--text);
            font-weight: 700;
        }

        .detail-list {
            margin: 10px 0 0;
            display: grid;
            gap: 7px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
        }

        .notice {
            padding: 14px 16px;
            color: var(--muted);
            box-shadow: none;
            margin-bottom: 14px;
            display: none;
        }

            .notice.show {
                display: block;
            }

        .month-block {
            margin-top: 16px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.055);
            border-radius: 18px;
            padding: 14px;
        }

            .month-block h3 {
                margin: 0 0 10px;
            }

        .totals-table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
        }

            .totals-table th, .totals-table td {
                padding: 10px;
                border-bottom: 1px solid rgba(255,255,255,0.09);
                text-align: left;
                color: var(--muted);
            }

            .totals-table th {
                color: var(--text);
                background: rgba(255,255,255,0.055);
            }

        @media (max-width: 920px) {
            header {
                display: block;
            }

            .pill {
                display: inline-flex;
                margin-top: 14px;
            }

            .shell {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                display: flex;
                gap: 8px;
                overflow-x: auto;
                border-radius: 18px;
            }

            .nav-btn {
                white-space: nowrap;
                width: auto;
            }

            .summary-grid, .quick-links, .two, form, .money-grid {
                grid-template-columns: 1fr;
            }

            .item, .pay-head {
                grid-template-columns: 1fr;
                display: grid;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="brand">
                <h1>Paycheck Budget Dashboard</h1>
                <p>Track cash flow paycheck by paycheck, assign income and spending to the right pay period, and project your balance through December 31.</p>
            </div>
            <div class="pill" id="yearPill"></div>
        </header>

        <div id="notice" class="notice"></div>

        <div class="shell">
            <aside class="sidebar" id="nav"></aside>

            <main class="main">
                <section class="module active" id="dashboard"></section>
                <section class="module" id="primary"></section>
                <section class="module" id="extra"></section>
                <section class="module" id="recurring"></section>
                <section class="module" id="categories"></section>
                <section class="module" id="projection"></section>
            </main>
        </div>
    </div>

    <script>
    const STORAGE_KEY = "paycheckBudgetDashboard.v1";
    const modules = [
      { id: "dashboard", label: "Dashboard", hint: "Overview" },
      { id: "primary", label: "Primary Income", hint: "Paychecks" },
      { id: "extra", label: "Additional Income", hint: "Bonuses" },
      { id: "recurring", label: "Recurring Payments", hint: "Bills" },
      { id: "categories", label: "Spending Categories", hint: "Tracking" },
      { id: "projection", label: "Paycheck Projection", hint: "Cash flow" }
    ];

    const defaultState = {
      primary: {
        amount: 0,
        interval: "biweekly",
        nextDate: "",
        currentCash: 0
      },
      additionalIncome: [],
      recurringPayments: [],
      categories: [],
      spendingEntries: [],
      activeModule: "dashboard"
    };

    let state = loadState();

    function clone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return clone(defaultState);
        const parsed = JSON.parse(raw);
        return {
          ...clone(defaultState),
          ...parsed,
          primary: { ...defaultState.primary, ...(parsed.primary || {}) },
          additionalIncome: Array.isArray(parsed.additionalIncome) ? parsed.additionalIncome : [],
          recurringPayments: Array.isArray(parsed.recurringPayments) ? parsed.recurringPayments : [],
          categories: Array.isArray(parsed.categories) ? parsed.categories : [],
          spendingEntries: Array.isArray(parsed.spendingEntries) ? parsed.spendingEntries : []
        };
      } catch (error) {
        localStorage.removeItem(STORAGE_KEY);
        showNotice("Saved budget data looked corrupted, so it was cleared safely. You can start fresh.");
        return clone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function showNotice(message) {
      const notice = document.getElementById("notice");
      if (!notice) return;
      notice.textContent = message;
      notice.classList.add("show");
      setTimeout(() => notice.classList.remove("show"), 6500);
    }

    function money(value) {
      const num = Number(value) || 0;
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(num);
    }

    function parseAmount(value) {
      const num = Number(value);
      return Number.isFinite(num) ? num : 0;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function uid() {
      return crypto?.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function localDate(value) {
      if (!value) return null;
      const [year, month, day] = value.split("-").map(Number);
      if (!year || !month || !day) return null;
      return new Date(year, month - 1, day);
    }

    function dateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function addDays(date, days) {
      const copy = new Date(date);
      copy.setDate(copy.getDate() + days);
      return copy;
    }

    function addMonths(date, months) {
      const copy = new Date(date);
      copy.setMonth(copy.getMonth() + months);
      return copy;
    }

    function endOfYear() {
      const now = new Date();
      return new Date(now.getFullYear(), 11, 31, 23, 59, 59);
    }

    function startOfYear() {
      const now = new Date();
      return new Date(now.getFullYear(), 0, 1);
    }

    function formatDate(value) {
      const date = typeof value === "string" ? localDate(value) : value;
      if (!date) return "No date";
      return date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    function monthName(monthIndex) {
      return new Date(new Date().getFullYear(), monthIndex, 1).toLocaleString(undefined, { month: "long" });
    }

    function parseDueDays(value) {
      return String(value || "")
        .split(",")
        .map(v => Number(v.trim()))
        .filter(n => Number.isInteger(n) && n >= 1 && n <= 31);
    }

    function getDateInputDefault() {
      return dateKey(new Date());
    }

    function getScheduleIncrement(interval) {
      if (interval === "weekly") return date => addDays(date, 7);
      if (interval === "biweekly") return date => addDays(date, 14);
      if (interval === "twiceMonthly") {
        return date => {
          const d = new Date(date);
          if (d.getDate() < 15) d.setDate(15);
          else {
            d.setMonth(d.getMonth() + 1);
            d.setDate(1);
          }
          return d;
        };
      }
      return date => addMonths(date, 1);
    }

    function generatePaychecks() {
      const next = localDate(state.primary.nextDate);
      const amount = parseAmount(state.primary.amount);
      if (!next || amount <= 0) return [];

      const checks = [];
      let date = next;
      const finalDate = endOfYear();
      const increment = getScheduleIncrement(state.primary.interval);
      let safety = 0;

      while (date <= finalDate && safety < 100) {
        checks.push({
          number: checks.length + 1,
          date: dateKey(date),
          primaryIncome: amount
        });
        date = increment(date);
        safety++;
      }

      return checks;
    }

    function getPeriodForDate(dateString, paychecks) {
      const target = localDate(dateString);
      if (!target || !paychecks.length) return -1;

      for (let i = 0; i < paychecks.length; i++) {
        const start = localDate(paychecks[i].date);
        const nextStart = paychecks[i + 1] ? localDate(paychecks[i + 1].date) : addDays(endOfYear(), 1);
        if (target >= start && target < nextStart) return i;
      }

      if (target < localDate(paychecks[0].date)) return 0;
      return -1;
    }

    function generateAdditionalOccurrences(item) {
      const start = localDate(item.date);
      if (!start) return [];
      const finalDate = endOfYear();
      const list = [];
      let date = start;
      let safety = 0;

      while (date <= finalDate && safety < 120) {
        list.push({
          id: item.id,
          name: item.name,
          amount: parseAmount(item.amount),
          date: dateKey(date)
        });

        if (item.frequency === "oneTime") break;
        if (item.frequency === "weekly") date = addDays(date, 7);
        else if (item.frequency === "biweekly") date = addDays(date, 14);
        else date = addMonths(date, 1);
        safety++;
      }

      return list;
    }

    function generateRecurringOccurrences(item) {
      const finalDate = endOfYear();
      const start = startOfYear();
      const list = [];
      const dueDays = parseDueDays(item.dueDays);
      const amount = parseAmount(item.amount);

      if (item.frequency === "monthly" || item.frequency === "yearly") {
        const months = item.frequency === "yearly" ? [0] : Array.from({ length: 12 }, (_, i) => i);
        months.forEach(month => {
          dueDays.forEach(day => {
            const date = new Date(start.getFullYear(), month, day);
            if (date.getMonth() === month && date >= start && date <= finalDate) {
              list.push({ id: item.id, name: item.name, amount, date: dateKey(date) });
            }
          });
        });
      }

      if (item.frequency === "weekly" || item.frequency === "biweekly") {
        const firstDay = dueDays[0] || 1;
        let date = new Date(start.getFullYear(), 0, firstDay);
        while (date < start) date = addDays(date, item.frequency === "weekly" ? 7 : 14);
        let safety = 0;
        while (date <= finalDate && safety < 120) {
          list.push({ id: item.id, name: item.name, amount, date: dateKey(date) });
          date = addDays(date, item.frequency === "weekly" ? 7 : 14);
          safety++;
        }
      }

      return list.sort((a, b) => a.date.localeCompare(b.date));
    }

    function buildProjection() {
      const paychecks = generatePaychecks();
      const periods = paychecks.map(check => ({
        ...check,
        startingBalance: 0,
        additionalIncome: 0,
        bills: 0,
        categorySpending: 0,
        netChange: 0,
        endingBalance: 0,
        extraDetails: [],
        billDetails: [],
        spendingDetails: []
      }));

      state.additionalIncome.flatMap(generateAdditionalOccurrences).forEach(item => {
        const index = getPeriodForDate(item.date, paychecks);
        if (index >= 0) {
          periods[index].additionalIncome += item.amount;
          periods[index].extraDetails.push(item);
        }
      });

      state.recurringPayments.flatMap(generateRecurringOccurrences).forEach(item => {
        const index = getPeriodForDate(item.date, paychecks);
        if (index >= 0) {
          periods[index].bills += item.amount;
          periods[index].billDetails.push(item);
        }
      });

      state.spendingEntries.forEach(entry => {
        const index = getPeriodForDate(entry.date, paychecks);
        if (index >= 0) {
          const category = state.categories.find(c => c.id === entry.categoryId);
          const detail = {
            ...entry,
            name: category ? category.name : "Deleted category",
            amount: parseAmount(entry.amount)
          };
          periods[index].categorySpending += detail.amount;
          periods[index].spendingDetails.push(detail);
        }
      });

      let running = parseAmount(state.primary.currentCash);
      periods.forEach(period => {
        period.startingBalance = running;
        period.netChange = period.primaryIncome + period.additionalIncome - period.bills - period.categorySpending;
        running += period.netChange;
        period.endingBalance = running;
      });

      return periods;
    }

    function dec31Balance() {
      const projection = buildProjection();
      if (!projection.length) return parseAmount(state.primary.currentCash);
      return projection[projection.length - 1].endingBalance;
    }

    function currentMonthSpendingTotal() {
      const now = new Date();
      return state.spendingEntries.reduce((sum, entry) => {
        const d = localDate(entry.date);
        if (d && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) {
          return sum + parseAmount(entry.amount);
        }
        return sum;
      }, 0);
    }

    function setActiveModule(id) {
      state.activeModule = id;
      saveState();
      document.querySelectorAll(".module").forEach(el => el.classList.toggle("active", el.id === id));
      document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.module === id));
      renderActiveModule();
    }

    function renderNav() {
      const nav = document.getElementById("nav");
      nav.innerHTML = modules.map(m => `
        <button class="nav-btn ${state.activeModule === m.id ? "active" : ""}" data-module="${m.id}" type="button">
          <span>${m.label}</span><small>${m.hint}</small>
        </button>
      `).join("");

      nav.querySelectorAll(".nav-btn").forEach(btn => {
        btn.addEventListener("click", () => setActiveModule(btn.dataset.module));
      });
    }

    function renderDashboard() {
      const el = document.getElementById("dashboard");
      const balance = dec31Balance();
      el.innerHTML = `
        <div class="panel">
          <div class="module-title">
            <div>
              <h2>Dashboard</h2>
              <p>Your quick financial snapshot without crowding the workspace.</p>
            </div>
          </div>

          <div class="grid summary-grid">
            ${summaryCard("Projected Dec 31 Balance", money(balance), balance < 0 ? "negative" : "positive")}
            ${summaryCard("Current Available Balance", money(state.primary.currentCash), parseAmount(state.primary.currentCash) < 0 ? "negative" : "positive")}
            ${summaryCard("Current Month Spending", money(currentMonthSpendingTotal()), "yellow")}
            ${summaryCard("Recurring Payments", state.recurringPayments.length, "blue")}
            ${summaryCard("Additional Income Items", state.additionalIncome.length, "positive")}
            ${summaryCard("Spending Categories", state.categories.length, "blue")}
          </div>
        </div>

        <div class="panel">
          <div class="module-title">
            <div>
              <h2>Jump into a module</h2>
              <p>Open one focused budgeting area at a time.</p>
            </div>
          </div>
          <div class="grid quick-links">
            ${quickCard("Primary Income", "Set paycheck amount, interval, and available cash.", "primary")}
            ${quickCard("Additional Income", "Add bonuses, reimbursements, and side income.", "extra")}
            ${quickCard("Recurring Payments", "Track bills and repeating payments.", "recurring")}
            ${quickCard("Spending Categories", "Create budgets and log spending entries.", "categories")}
            ${quickCard("Paycheck Projection", "Review paycheck-by-paycheck cash flow.", "projection")}
          </div>
        </div>
      `;

      el.querySelectorAll("[data-jump]").forEach(btn => {
        btn.addEventListener("click", () => setActiveModule(btn.dataset.jump));
      });
    }

    function summaryCard(label, value, cls = "") {
      return `
        <div class="card">
          <div class="card-label">${escapeHtml(label)}</div>
          <div class="card-value ${cls}">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function quickCard(title, subtitle, module) {
      return `
        <button class="quick-card" type="button" data-jump="${module}">
          <strong>${escapeHtml(title)}</strong>
          <span>${escapeHtml(subtitle)}</span>
        </button>
      `;
    }

    function renderPrimary() {
      const el = document.getElementById("primary");
      el.innerHTML = `
        <div class="panel">
          <div class="module-title">
            <div>
              <h2>Primary Income</h2>
              <p>Set your main paycheck pattern and starting available money.</p>
            </div>
          </div>

          <form id="primaryForm">
            <label>Paycheck amount
              <input type="number" step="0.01" min="0" name="amount" value="${escapeHtml(state.primary.amount)}" required>
            </label>
            <label>Pay interval
              <select name="interval">
                ${option("weekly", "Weekly", state.primary.interval)}
                ${option("biweekly", "Biweekly", state.primary.interval)}
                ${option("twiceMonthly", "Twice monthly", state.primary.interval)}
                ${option("monthly", "Monthly", state.primary.interval)}
              </select>
            </label>
            <label>Next paycheck date
              <input type="date" name="nextDate" value="${escapeHtml(state.primary.nextDate || getDateInputDefault())}" required>
            </label>
            <label>Money available right now
              <input type="number" step="0.01" name="currentCash" value="${escapeHtml(state.primary.currentCash)}" required>
            </label>
            <div class="full btn-row">
              <button class="btn" type="submit">Save primary income</button>
              <button class="btn secondary" type="button" data-jump="projection">View projection</button>
            </div>
          </form>
        </div>
      `;

      document.getElementById("primaryForm").addEventListener("submit", event => {
        event.preventDefault();
        const form = new FormData(event.target);
        const amount = parseAmount(form.get("amount"));
        const currentCash = parseAmount(form.get("currentCash"));
        const nextDate = form.get("nextDate");

        if (amount <= 0 || !nextDate) return showNotice("Please enter a valid paycheck amount and next paycheck date.");

        state.primary = {
          amount,
          interval: form.get("interval"),
          nextDate,
          currentCash
        };
        saveState();
        renderAll();
        showNotice("Primary income saved.");
      });

      el.querySelector("[data-jump]").addEventListener("click", () => setActiveModule("projection"));
    }

    function option(value, label, selected) {
      return `<option value="${value}" ${value === selected ? "selected" : ""}>${label}</option>`;
    }

    function renderAdditionalIncome() {
      const el = document.getElementById("extra");
      el.innerHTML = `
        <div class="panel">
          <div class="module-title">
            <div>
              <h2>Additional Income</h2>
              <p>Add extra money and let it increase the correct paycheck period.</p>
            </div>
          </div>

          <form id="extraForm">
            <label>Income name
              <input name="name" placeholder="Bonus, side job, reimbursement" required>
            </label>
            <label>Amount
              <input type="number" step="0.01" min="0" name="amount" required>
            </label>
            <label>Start/pay date
              <input type="date" name="date" value="${getDateInputDefault()}" required>
            </label>
            <label>Frequency
              <select name="frequency">
                <option value="oneTime">One time</option>
                <option value="weekly">Weekly</option>
                <option value="biweekly">Biweekly</option>
                <option value="monthly">Monthly</option>
              </select>
            </label>
            <div class="full btn-row">
              <button class="btn" type="submit">Add income</button>
            </div>
          </form>

          <div class="list">
            ${state.additionalIncome.length ? state.additionalIncome.map(item => listItem(
              item.name,
              `${money(item.amount)} • ${formatDate(item.date)} • ${frequencyLabel(item.frequency)}`,
              "Remove",
              item.id,
              "remove-extra"
            )).join("") : emptyText("No additional income has been added yet.")}
          </div>
        </div>
      `;

      document.getElementById("extraForm").addEventListener("submit", event => {
        event.preventDefault();
        const form = new FormData(event.target);
        const item = {
          id: uid(),
          name: form.get("name").trim(),
          amount: parseAmount(form.get("amount")),
          date: form.get("date"),
          frequency: form.get("frequency")
        };

        if (!item.name || item.amount <= 0 || !item.date) return showNotice("Please enter a valid income name, amount, and date.");

        state.additionalIncome.push(item);
        saveState();
        renderAll();
        showNotice("Additional income added.");
      });

      el.querySelectorAll("[data-remove-extra]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.additionalIncome = state.additionalIncome.filter(item => item.id !== btn.dataset.removeExtra);
          saveState();
          renderAll();
        });
      });
    }

    function frequencyLabel(value) {
      return {
        oneTime: "One time",
        weekly: "Weekly",
        biweekly: "Biweekly",
        monthly: "Monthly",
        yearly: "Yearly"
      }[value] || value;
    }

    function listItem(title, subtitle, buttonText, id, actionName) {
      return `
        <div class="item">
          <div>
            <strong>${escapeHtml(title)}</strong>
            <small>${escapeHtml(subtitle)}</small>
          </div>
          <button class="btn danger" type="button" data-${actionName}="${escapeHtml(id)}">${escapeHtml(buttonText)}</button>
        </div>
      `;
    }

    function emptyText(text) {
      return `<div class="muted">${escapeHtml(text)}</div>`;
    }

    function renderRecurringPayments() {
      const el = document.getElementById("recurring");
      el.innerHTML = `
        <div class="panel">
          <div class="module-title">
            <div>
              <h2>Recurring Payments</h2>
              <p>Add repeating bills. Due days can be one day or multiple days like 1,15.</p>
            </div>
          </div>

          <form id="billForm">
            <label>Payment name
              <input name="name" placeholder="Rent, phone, utility" required>
            </label>
            <label>Amount
              <input type="number" step="0.01" min="0" name="amount" required>
            </label>
            <label>Due day or days
              <input name="dueDays" placeholder="1 or 1,15" required>
            </label>
            <label>Frequency
              <select name="frequency">
                <option value="monthly">Monthly</option>
                <option value="weekly">Weekly</option>
                <option value="biweekly">Biweekly</option>
                <option value="yearly">Yearly</option>
              </select>
            </label>
            <div class="full btn-row">
              <button class="btn" type="submit">Add recurring payment</button>
            </div>
          </form>

          <div class="list">
            ${state.recurringPayments.length ? state.recurringPayments.map(item => listItem(
              item.name,
              `${money(item.amount)} • Due ${item.dueDays} • ${frequencyLabel(item.frequency)}`,
              "Remove",
              item.id,
              "remove-bill"
            )).join("") : emptyText("No recurring payments have been added yet.")}
          </div>
        </div>
      `;

      document.getElementById("billForm").addEventListener("submit", event => {
        event.preventDefault();
        const form = new FormData(event.target);
        const dueDays = form.get("dueDays").trim();
        const item = {
          id: uid(),
          name: form.get("name").trim(),
          amount: parseAmount(form.get("amount")),
          dueDays,
          frequency: form.get("frequency")
        };

        if (!item.name || item.amount <= 0 || !parseDueDays(dueDays).length) {
          return showNotice("Please enter a valid bill name, amount, and due day between 1 and 31.");
        }

        state.recurringPayments.push(item);
        saveState();
        renderAll();
        showNotice("Recurring payment added.");
      });

      el.querySelectorAll("[data-remove-bill]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.recurringPayments = state.recurringPayments.filter(item => item.id !== btn.dataset.removeBill);
          saveState();
          renderAll();
        });
      });
    }

    function renderCategories() {
      const el = document.getElementById("categories");
      el.innerHTML = `
        <div class="panel">
          <div class="module-title">
            <div>
              <h2>Spending Categories</h2>
              <p>Create monthly budget buckets, add entries, and remove accidental entries.</p>
            </div>
          </div>

          <div class="grid two">
            <div class="card">
              <h3>Create category</h3>
              <form id="categoryForm">
                <label class="full">Category name
                  <input name="name" placeholder="Groceries, gas, pet supplies" required>
                </label>
                <label class="full">Monthly budget or goal
                  <input type="number" step="0.01" min="0" name="budget" placeholder="Optional">
                </label>
                <div class="full btn-row">
                  <button class="btn" type="submit">Add category</button>
                </div>
              </form>
            </div>

            <div class="card">
              <h3>Add spending entry</h3>
              <form id="spendingForm">
                <label class="full">Category
                  <select name="categoryId" required>
                    <option value="">Choose category</option>
                    ${state.categories.map(c => `<option value="${escapeHtml(c.id)}">${escapeHtml(c.name)}</option>`).join("")}
                  </select>
                </label>
                <label>Amount spent
                  <input type="number" step="0.01" min="0" name="amount" required>
                </label>
                <label>Date
                  <input type="date" name="date" value="${getDateInputDefault()}" required>
                </label>
                <label class="full">Note
                  <textarea name="note" placeholder="Optional note"></textarea>
                </label>
                <div class="full btn-row">
                  <button class="btn" type="submit">Add spending</button>
                </div>
              </form>
            </div>
          </div>

          <div class="grid two" style="margin-top:16px;">
            <div class="card">
              <h3>Categories</h3>
              <div class="list">
                ${state.categories.length ? state.categories.map(c => listItem(
                  c.name,
                  `Monthly budget: ${money(c.budget || 0)}`,
                  "Remove",
                  c.id,
                  "remove-category"
                )).join("") : emptyText("No spending categories yet.")}
              </div>
            </div>

            <div class="card">
              <h3>Spending entries</h3>
              <div class="list">
                ${state.spendingEntries.length ? state.spendingEntries.map(entry => {
                  const category = state.categories.find(c => c.id === entry.categoryId);
                  return listItem(
                    category ? category.name : "Deleted category",
                    `${money(entry.amount)} • ${formatDate(entry.date)}${entry.note ? " • " + entry.note : ""}`,
                    "Remove",
                    entry.id,
                    "remove-entry"
                  );
                }).join("") : emptyText("No spending entries yet.")}
              </div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="module-title">
            <div>
              <h2>Monthly Category Totals</h2>
              <p>Scan each month by category total and remaining budget.</p>
            </div>
          </div>
          ${renderMonthlyTotals()}
        </div>
      `;

      document.getElementById("categoryForm").addEventListener("submit", event => {
        event.preventDefault();
        const form = new FormData(event.target);
        const category = {
          id: uid(),
          name: form.get("name").trim(),
          budget: parseAmount(form.get("budget"))
        };
        if (!category.name) return showNotice("Please enter a category name.");
        state.categories.push(category);
        saveState();
        renderAll();
      });

      document.getElementById("spendingForm").addEventListener("submit", event => {
        event.preventDefault();
        const form = new FormData(event.target);
        const entry = {
          id: uid(),
          categoryId: form.get("categoryId"),
          amount: parseAmount(form.get("amount")),
          date: form.get("date"),
          note: form.get("note").trim()
        };

        if (!entry.categoryId || entry.amount <= 0 || !entry.date) {
          return showNotice("Please choose a category, amount, and date.");
        }

        state.spendingEntries.push(entry);
        saveState();
        renderAll();
      });

      el.querySelectorAll("[data-remove-category]").forEach(btn => {
        btn.addEventListener("click", () => {
          removeCategory(btn.dataset.removeCategory);
          saveState();
          renderAll();
        });
      });

      el.querySelectorAll("[data-remove-entry]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.spendingEntries = state.spendingEntries.filter(entry => entry.id !== btn.dataset.removeEntry);
          saveState();
          renderAll();
        });
      });
    }

    function removeCategory(id) {
      state.categories = state.categories.filter(category => category.id !== id);
      state.spendingEntries = state.spendingEntries.filter(entry => entry.categoryId !== id);
    }

    function renderMonthlyTotals() {
      if (!state.categories.length) return emptyText("Create categories to see monthly totals.");

      const rowsByMonth = Array.from({ length: 12 }, () => []);
      state.categories.forEach(category => {
        for (let month = 0; month < 12; month++) {
          const spent = state.spendingEntries.reduce((sum, entry) => {
            const d = localDate(entry.date);
            if (entry.categoryId === category.id && d && d.getMonth() === month && d.getFullYear() === new Date().getFullYear()) {
              return sum + parseAmount(entry.amount);
            }
            return sum;
          }, 0);
          if (spent > 0 || parseAmount(category.budget) > 0) {
            rowsByMonth[month].push({
              category: category.name,
              spent,
              remaining: parseAmount(category.budget) - spent
            });
          }
        }
      });

      return rowsByMonth.map((rows, month) => {
        if (!rows.length) return "";
        return `
          <div class="month-block">
            <h3>${monthName(month)}</h3>
            <table class="totals-table">
              <thead><tr><th>Category</th><th>Total Spent</th><th>Remaining</th></tr></thead>
              <tbody>
                ${rows.map(row => `
                  <tr>
                    <td>${escapeHtml(row.category)}</td>
                    <td>${money(row.spent)}</td>
                    <td class="${row.remaining < 0 ? "negative" : "positive"}">${money(row.remaining)}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }).join("") || emptyText("No monthly totals yet.");
    }

    function renderProjection() {
      const el = document.getElementById("projection");
      const projection = buildProjection();

      el.innerHTML = `
        <div class="panel">
          <div class="module-title">
            <div>
              <h2>Paycheck Projection</h2>
              <p>Running projected balance through December 31.</p>
            </div>
            <div class="pill">Final: <strong class="${dec31Balance() < 0 ? "negative" : "positive"}">${money(dec31Balance())}</strong></div>
          </div>

          ${projection.length ? `<div class="pay-list">${projection.map(renderPaycheckCard).join("")}</div>` : emptyText("Enter primary income first to generate your paycheck schedule.")}
        </div>
      `;
    }

    function renderPaycheckCard(period) {
      return `
        <article class="pay-card">
          <div class="pay-head">
            <div>
              <strong>Paycheck #${period.number}</strong>
              <div class="muted">${formatDate(period.date)}</div>
            </div>
            <div class="card-value ${period.endingBalance < 0 ? "negative" : "positive"}">${money(period.endingBalance)}</div>
          </div>

          <div class="money-grid">
            ${mini("Starting", money(period.startingBalance), period.startingBalance < 0 ? "negative" : "")}
            ${mini("Paycheck", money(period.primaryIncome), "positive")}
            ${mini("Extra income", money(period.additionalIncome), "positive")}
            ${mini("Bills", "-" + money(period.bills), period.bills ? "negative" : "")}
            ${mini("Spending", "-" + money(period.categorySpending), period.categorySpending ? "negative" : "")}
            ${mini("Net change", money(period.netChange), period.netChange < 0 ? "negative" : "positive")}
          </div>

          <details>
            <summary>View period details</summary>
            <div class="detail-list">
              ${detailGroup("Extra income", period.extraDetails, true)}
              ${detailGroup("Recurring bills", period.billDetails, false)}
              ${detailGroup("Category spending", period.spendingDetails, false)}
            </div>
          </details>
        </article>
      `;
    }

    function mini(label, value, cls = "") {
      return `<div class="mini"><div>${escapeHtml(label)}</div><div class="${cls}">${escapeHtml(value)}</div></div>`;
    }

    function detailGroup(title, items, positive) {
      if (!items.length) return `<div class="detail-row"><span>${escapeHtml(title)}</span><span class="muted">None</span></div>`;
      return items.map(item => `
        <div class="detail-row">
          <span>${escapeHtml(title)}: ${escapeHtml(item.name || item.note || "Item")} <small class="muted">(${formatDate(item.date)})</small></span>
          <span class="${positive ? "positive" : "negative"}">${positive ? "+" : "-"}${money(item.amount)}</span>
        </div>
      `).join("");
    }

    function renderActiveModule() {
      const id = state.activeModule || "dashboard";
      if (id === "dashboard") renderDashboard();
      if (id === "primary") renderPrimary();
      if (id === "extra") renderAdditionalIncome();
      if (id === "recurring") renderRecurringPayments();
      if (id === "categories") renderCategories();
      if (id === "projection") renderProjection();
    }

    function renderAll() {
      document.getElementById("yearPill").textContent = `Projection year: ${new Date().getFullYear()}`;
      renderNav();
      document.querySelectorAll(".module").forEach(el => el.classList.toggle("active", el.id === state.activeModule));
      renderActiveModule();
    }

    function runTests() {
      console.assert(money(10) === "$10.00", "currency formatting");
      console.assert(JSON.stringify(parseDueDays("1")) === JSON.stringify([1]), "single due day parsing");
      console.assert(JSON.stringify(parseDueDays("1,15")) === JSON.stringify([1,15]), "multiple due days parsing");
      console.assert(escapeHtml("<script>") === "&lt;script&gt;", "HTML escaping");
      console.assert(localDate("2026-05-02").getMonth() === 4, "date input handling");

      const backup = clone(state);
      state = {
        primary: { amount: 1000, interval: "biweekly", nextDate: `${new Date().getFullYear()}-01-01`, currentCash: 500 },
        additionalIncome: [{ id: "extra1", name: "Bonus", amount: 200, date: `${new Date().getFullYear()}-01-02`, frequency: "oneTime" }],
        recurringPayments: [{ id: "bill1", name: "Rent", amount: 100, dueDays: "1,15", frequency: "monthly" }],
        categories: [{ id: "cat1", name: "Groceries", budget: 300 }],
        spendingEntries: [{ id: "sp1", categoryId: "cat1", amount: 50, date: `${new Date().getFullYear()}-01-03`, note: "test" }],
        activeModule: "dashboard"
      };

      const bills = generateRecurringOccurrences(state.recurringPayments[0]);
      console.assert(bills.some(b => b.date.endsWith("-01-01")), "recurring bill generation");
      console.assert(bills.some(b => b.date.endsWith("-01-15")), "multiple due days bill generation");

      const projection = buildProjection();
      console.assert(projection[0].categorySpending === 50, "spending subtraction from pay periods");
      console.assert(projection[0].additionalIncome === 200, "extra income application");

      removeCategory("cat1");
      console.assert(state.categories.length === 0, "removing a category");
      console.assert(state.spendingEntries.length === 0, "removing linked entries");

      setActiveModule("dashboard");
      console.assert(state.activeModule === "dashboard", "module/tab switching behavior");

      state = backup;
      saveState();
    }

    renderAll();
    if (!modules.some(m => m.id === state.activeModule)) setActiveModule("dashboard");
    runTests();
    </script>
</body>
</html>
