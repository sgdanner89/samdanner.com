<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grand Staff Builder</title>

<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.3/build/cjs/vexflow.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: #eef3f8;
}

.app {
    max-width: 1300px;
    margin: auto;
    background: #071523;
    color: white;
    border-radius: 18px;
    padding: 18px;
}

.panel {
    background: #0d1b2b;
    border: 1px solid #40566e;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 14px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
}

.items, .build-row, .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

button, .tool {
    border: 1px solid #526981;
    border-radius: 10px;
    background: #12283f;
    color: white;
    padding: 12px;
    font-weight: bold;
    cursor: pointer;
}

.tool {
    min-width: 74px;
    text-align: center;
}

.tool.active {
    background: #1664d9;
}

.symbol {
    font-size: 30px;
}

.small {
    font-size: 12px;
    opacity: .85;
}

.slot {
    width: 125px;
    min-height: 125px;
    background: white;
    color: #111;
    border-radius: 12px;
    border: 2px dashed #9fb0c5;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 8px;
}

.slot strong {
    color: #075cff;
    font-size: 22px;
}

.staff-box {
    background: white;
    border-radius: 14px;
    padding: 12px;
    overflow-x: auto;
}

#staff {
    min-width: 1100px;
}

.play {
    background: #22a047;
    border-color: #37d66b;
    font-size: 18px;
}

.stop {
    background: #b91c1c;
    border-color: #ef4444;
    font-size: 18px;
}

.danger {
    color: #ff7d89;
    border-color: #ff5b6b;
}

.save {
    background: #2563eb;
    border-color: #60a5fa;
}

.toggle.on {
    background: #1d8d45;
    border-color: #39d66b;
}

input, select {
    padding: 12px;
    border-radius: 8px;
    border: none;
}

input[type="number"] {
    width: 80px;
    text-align: center;
}

#exerciseName {
    width: 260px;
}

#savedExercises {
    min-width: 260px;
}
</style>
</head>

<body>
<div class="app">

<h1>Grand Staff Builder</h1>

<div class="grid">
    <div class="panel">
        <h3>1. Choose Pitch</h3>
        <div class="items" id="pitchTools"></div>
    </div>

    <div class="panel">
        <h3>2. Choose Accidental</h3>
        <div class="items" id="accidentalTools">
            <button class="tool active" onclick="selectAccidental('natural', this)">♮ Natural</button>
            <button class="tool" onclick="selectAccidental('flat', this)">♭ Flat</button>
            <button class="tool" onclick="selectAccidental('sharp', this)">♯ Sharp</button>
        </div>
    </div>
</div>

<div class="panel">
    <h3>3. Choose Rhythm</h3>
    <div class="items" id="rhythmTools"></div>
</div>

<div class="panel">
    <h3>Save / Load Exercises</h3>
    <div class="controls">
        <input id="exerciseName" type="text" placeholder="Exercise name">
        <button class="save" onclick="saveExercise()">Save Exercise</button>

        <select id="savedExercises">
            <option value="">Select saved exercise</option>
        </select>

        <button onclick="loadSelectedExercise()">Load</button>
        <button class="danger" onclick="deleteSelectedExercise()">Delete</button>
    </div>
</div>

<div class="panel">
    <h3>Build Area</h3>
    <p>Click a pitch, choose natural/flat/sharp, then click a rhythm.</p>
    <div class="build-row" id="buildRow"></div>
</div>

<div class="panel">
    <h3>Grand Staff Preview</h3>
    <div class="staff-box">
        <div id="staff"></div>
    </div>
</div>

<div class="panel controls">
    <button class="play" onclick="startLoop()">▶ Play Loop</button>
    <button class="stop" onclick="stopPlayback()">■ Stop</button>
    <button onclick="transpose(-1)">← Half Step Down</button>
    <button onclick="transpose(1)">→ Half Step Up</button>

    <label>Tempo</label>
    <input id="tempo" type="number" value="90" min="40" max="220">

    <button id="metroBtn" class="toggle on" onclick="toggleMetronome()">Metronome On</button>
    <button id="countBtn" class="toggle on" onclick="toggleCountIn()">4 Count In On</button>
    <button class="danger" onclick="clearAll()">Clear All</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    doc,
    getDoc,
    deleteDoc,
    serverTimestamp,
    query,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA3R_frU0hDntthZ9UREOwGCqQAj6G_T8k",
    authDomain: "vocal-warmup-153da.firebaseapp.com",
    projectId: "vocal-warmup-153da",
    storageBucket: "vocal-warmup-153da.firebasestorage.app",
    messagingSenderId: "1086982995331",
    appId: "1:1086982995331:web:a9e3c0bf92670476324ab6",
    measurementId: "G-Y9XBJGB84T"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const exercisesCollection = collection(db, "vocalWarmupExercises");

const VF = Vex.Flow;

const pitches = [
    "C3","D3","E3","F3","G3","A3","B3",
    "C4","D4","E4","F4","G4","A4","B4",
    "C5","D5","E5","F5","G5","A5","B5"
];

const rhythms = [
    { name: "Whole", symbol: "𝅝", duration: "w", beats: 4 },
    { name: "Half", symbol: "𝅗𝅥", duration: "h", beats: 2 },
    { name: "Dotted Half", symbol: "𝅗𝅥.", duration: "h", dots: 1, beats: 3 },
    { name: "Quarter", symbol: "♩", duration: "q", beats: 1 },
    { name: "Eighth", symbol: "♪", duration: "8", beats: .5 },
    { name: "Dotted Eighth", symbol: "♪.", duration: "8", dots: 1, beats: .75 },
    { name: "Sixteenth", symbol: "♬", duration: "16", beats: .25 },
    { name: "Dotted Sixteenth", symbol: "♬.", duration: "16", dots: 1, beats: .375 },

    { name: "Whole Rest", symbol: "𝄻", duration: "wr", beats: 4, rest: true },
    { name: "Half Rest", symbol: "𝄼", duration: "hr", beats: 2, rest: true },
    { name: "Dotted Half Rest", symbol: "𝄼.", duration: "hr", dots: 1, beats: 3, rest: true },
    { name: "Quarter Rest", symbol: "𝄽", duration: "qr", beats: 1, rest: true },
    { name: "Dotted Quarter Rest", symbol: "𝄽.", duration: "qr", dots: 1, beats: 1.5, rest: true },
    { name: "Eighth Rest", symbol: "𝄾", duration: "8r", beats: .5, rest: true },
    { name: "Dotted Eighth Rest", symbol: "𝄾.", duration: "8r", dots: 1, beats: .75, rest: true },
    { name: "Sixteenth Rest", symbol: "𝄿", duration: "16r", beats: .25, rest: true },
    { name: "Dotted Sixteenth Rest", symbol: "𝄿.", duration: "16r", dots: 1, beats: .375, rest: true }
];

let selectedPitch = null;
let selectedAccidental = "natural";
let pattern = [];
let metronomeOn = true;
let countInOn = true;
let isPlaying = false;
let audioCtx = null;
let activeOscillators = [];

const pitchTools = document.getElementById("pitchTools");
const rhythmTools = document.getElementById("rhythmTools");
const buildRow = document.getElementById("buildRow");
const savedExercises = document.getElementById("savedExercises");

pitches.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "tool";
    btn.innerHTML = `<div style="color:#4b91ff;font-size:24px;">${p}</div>`;
    btn.onclick = () => {
        selectedPitch = p;
        document.querySelectorAll("#pitchTools .tool").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    };
    pitchTools.appendChild(btn);
});

rhythms.forEach(r => {
    const btn = document.createElement("button");
    btn.className = "tool";
    btn.innerHTML = `<div class="symbol">${r.symbol}</div><div class="small">${r.name}</div>`;
    btn.onclick = () => {
        if (!selectedPitch && !r.rest) return alert("Choose a pitch first.");

        pattern.push({
            pitch: r.rest ? "B4" : selectedPitch,
            accidental: r.rest ? "natural" : selectedAccidental,
            rhythm: r
        });

        renderBuildArea();
        renderStaff();
    };
    rhythmTools.appendChild(btn);
});

window.selectAccidental = function(type, button) {
    selectedAccidental = type;
    document.querySelectorAll("#accidentalTools .tool").forEach(b => b.classList.remove("active"));
    button.classList.add("active");
};

function accidentalSymbol(type) {
    if (type === "sharp") return "♯";
    if (type === "flat") return "♭";
    return "♮";
}

function renderBuildArea() {
    buildRow.innerHTML = "";

    pattern.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "slot";

        const pitchLabel = item.rhythm.rest
            ? "Rest"
            : `${item.pitch}${accidentalSymbol(item.accidental)}`;

        div.innerHTML = `
            <div>
                <button onclick="removeItem(${index})">×</button>
                <div class="symbol">${item.rhythm.symbol}</div>
                <strong>${pitchLabel}</strong>
                <div>${item.rhythm.name}</div>
            </div>
        `;

        buildRow.appendChild(div);
    });
}

function renderStaff() {
    const staffDiv = document.getElementById("staff");
    staffDiv.innerHTML = "";

    const renderer = new VF.Renderer(staffDiv, VF.Renderer.Backends.SVG);
    renderer.resize(1100, 430);

    const context = renderer.getContext();

    const treble = new VF.Stave(40, 40, 1000);
    treble.addClef("treble");
    treble.setContext(context).draw();

    const bass = new VF.Stave(40, 220, 1000);
    bass.addClef("bass");
    bass.setContext(context).draw();

    new VF.StaveConnector(treble, bass).setType(VF.StaveConnector.type.BRACE).setContext(context).draw();
    new VF.StaveConnector(treble, bass).setType(VF.StaveConnector.type.SINGLE_LEFT).setContext(context).draw();
    new VF.StaveConnector(treble, bass).setType(VF.StaveConnector.type.SINGLE_RIGHT).setContext(context).draw();

    const trebleNotes = [];
    const bassNotes = [];

    pattern.forEach(item => {
        if (item.rhythm.rest) {
            trebleNotes.push(makeVexNote(item, "treble"));
            bassNotes.push(makeGhostNote(item.rhythm));
            return;
        }

        const clef = getClef(item.pitch);
        const note = makeVexNote(item, clef);

        if (clef === "treble") {
            trebleNotes.push(note);
            bassNotes.push(makeGhostNote(item.rhythm));
        } else {
            bassNotes.push(note);
            trebleNotes.push(makeGhostNote(item.rhythm));
        }
    });

    if (!trebleNotes.length) return;

    const trebleVoice = new VF.Voice({ num_beats: Math.max(pattern.length, 1), beat_value: 4 })
        .setStrict(false)
        .addTickables(trebleNotes);

    const bassVoice = new VF.Voice({ num_beats: Math.max(pattern.length, 1), beat_value: 4 })
        .setStrict(false)
        .addTickables(bassNotes);

    new VF.Formatter()
        .joinVoices([trebleVoice])
        .joinVoices([bassVoice])
        .format([trebleVoice, bassVoice], 900);

    trebleVoice.draw(context, treble);
    bassVoice.draw(context, bass);
}

function makeVexNote(item, clef) {
    const rhythm = item.rhythm;

    const key = rhythm.rest
        ? clef === "treble" ? "b/4" : "d/3"
        : toVexKey(item.pitch);

    const note = new VF.StaveNote({
        clef,
        keys: [key],
        duration: rhythm.duration
    });

    if (!rhythm.rest) {
        if (item.accidental === "sharp") note.addModifier(new VF.Accidental("#"), 0);
        if (item.accidental === "flat") note.addModifier(new VF.Accidental("b"), 0);
        if (item.accidental === "natural") note.addModifier(new VF.Accidental("n"), 0);
    }

    if (rhythm.dots) {
        VF.Dot.buildAndAttach([note], { all: true });
    }

    return note;
}

function makeGhostNote(rhythm) {
    const duration = rhythm.duration.replace("r", "");
    const ghost = new VF.GhostNote({ duration });

    if (rhythm.dots) {
        VF.Dot.buildAndAttach([ghost], { all: true });
    }

    return ghost;
}

function toVexKey(pitch) {
    return pitch[0].toLowerCase() + "/" + pitch.slice(1);
}

function getClef(pitch) {
    const octave = Number(pitch.slice(1));
    return octave >= 4 ? "treble" : "bass";
}

window.removeItem = function(index) {
    pattern.splice(index, 1);
    renderBuildArea();
    renderStaff();
};

window.clearAll = function() {
    stopPlayback();
    pattern = [];
    renderBuildArea();
    renderStaff();
};

window.transpose = function(amount) {
    pattern = pattern.map(item => {
        if (item.rhythm.rest) return item;

        const index = pitches.indexOf(item.pitch);
        const next = Math.max(0, Math.min(pitches.length - 1, index + amount));

        return {
            ...item,
            pitch: pitches[next]
        };
    });

    renderBuildArea();
    renderStaff();
};

window.toggleMetronome = function() {
    metronomeOn = !metronomeOn;
    const btn = document.getElementById("metroBtn");
    btn.classList.toggle("on", metronomeOn);
    btn.textContent = metronomeOn ? "Metronome On" : "Metronome Off";
};

window.toggleCountIn = function() {
    countInOn = !countInOn;
    const btn = document.getElementById("countBtn");
    btn.classList.toggle("on", countInOn);
    btn.textContent = countInOn ? "4 Count In On" : "4 Count In Off";
};

function getAudioContext() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if (audioCtx.state === "suspended") {
        audioCtx.resume();
    }

    return audioCtx;
}

function getFrequency(pitch, accidental) {
    const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const letter = pitch[0];
    const octave = Number(pitch.slice(1));

    let noteIndex = noteNames.indexOf(letter);

    if (accidental === "sharp") noteIndex += 1;
    if (accidental === "flat") noteIndex -= 1;

    let adjustedOctave = octave;

    if (noteIndex < 0) {
        noteIndex = 11;
        adjustedOctave -= 1;
    }

    if (noteIndex > 11) {
        noteIndex = 0;
        adjustedOctave += 1;
    }

    const midi = (adjustedOctave + 1) * 12 + noteIndex;
    return 440 * Math.pow(2, (midi - 69) / 12);
}

function playPianoNote(freq, startTime, duration = 0.5) {
    const ctx = getAudioContext();

    const masterGain = ctx.createGain();
    masterGain.connect(ctx.destination);

    masterGain.gain.setValueAtTime(0.0001, startTime);
    masterGain.gain.exponentialRampToValueAtTime(0.35, startTime + 0.015);
    masterGain.gain.exponentialRampToValueAtTime(0.18, startTime + 0.12);
    masterGain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

    const harmonics = [
        { mult: 1, gain: 1 },
        { mult: 2, gain: 0.45 },
        { mult: 3, gain: 0.22 },
        { mult: 4, gain: 0.12 }
    ];

    harmonics.forEach(h => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "triangle";
        osc.frequency.setValueAtTime(freq * h.mult, startTime);
        gain.gain.setValueAtTime(h.gain, startTime);

        osc.connect(gain);
        gain.connect(masterGain);

        activeOscillators.push(osc);

        osc.start(startTime);
        osc.stop(startTime + duration + 0.05);
    });
}

function playClick(startTime, strong = false) {
    const ctx = getAudioContext();

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "square";
    osc.frequency.setValueAtTime(strong ? 1400 : 900, startTime);

    gain.gain.setValueAtTime(0.12, startTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.04);

    osc.connect(gain);
    gain.connect(ctx.destination);

    activeOscillators.push(osc);

    osc.start(startTime);
    osc.stop(startTime + 0.05);
}

function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

window.startLoop = async function() {
    if (!pattern.length || isPlaying) return;

    isPlaying = true;

    while (isPlaying) {
        await playOneLoop();
    }
};

async function playOneLoop() {
    const bpm = Number(document.getElementById("tempo").value);
    const beatSeconds = 60 / bpm;
    const ctx = getAudioContext();

    let time = ctx.currentTime + 0.1;
    let totalSeconds = 0;

    if (countInOn) {
        for (let i = 0; i < 4; i++) {
            if (metronomeOn) playClick(time, i === 0);
            time += beatSeconds;
            totalSeconds += beatSeconds;
        }
    }

    for (const item of pattern) {
        if (!isPlaying) break;

        if (metronomeOn) playClick(time, true);

        if (!item.rhythm.rest) {
            const freq = getFrequency(item.pitch, item.accidental);
            const noteLength = Math.max(0.2, item.rhythm.beats * beatSeconds * 0.9);
            playPianoNote(freq, time, noteLength);
        }

        time += item.rhythm.beats * beatSeconds;
        totalSeconds += item.rhythm.beats * beatSeconds;
    }

    await wait(totalSeconds * 1000);
}

window.stopPlayback = function() {
    isPlaying = false;

    activeOscillators.forEach(osc => {
        try { osc.stop(); } catch (e) {}
    });

    activeOscillators = [];
};

window.saveExercise = async function() {
    const name = document.getElementById("exerciseName").value.trim();

    if (!name) {
        alert("Please enter an exercise name.");
        return;
    }

    if (!pattern.length) {
        alert("Please create a pattern before saving.");
        return;
    }

    try {
        await addDoc(exercisesCollection, {
            name,
            pattern,
            tempo: Number(document.getElementById("tempo").value),
            metronomeOn,
            countInOn,
            createdAt: serverTimestamp()
        });

        document.getElementById("exerciseName").value = "";
        await loadExerciseList();

        alert("Exercise saved.");
    } catch (error) {
        console.error(error);
        alert("Save failed. Check your Firestore rules.");
    }
};

async function loadExerciseList() {
    savedExercises.innerHTML = `<option value="">Select saved exercise</option>`;

    const q = query(exercisesCollection, orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);

    snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const option = document.createElement("option");

        option.value = docSnap.id;
        option.textContent = data.name || "Untitled Exercise";

        savedExercises.appendChild(option);
    });
}

window.loadSelectedExercise = async function() {
    const id = savedExercises.value;

    if (!id) {
        alert("Please select a saved exercise.");
        return;
    }

    const exerciseRef = doc(db, "vocalWarmupExercises", id);
    const snapshot = await getDoc(exerciseRef);

    if (!snapshot.exists()) {
        alert("Exercise not found.");
        return;
    }

    const data = snapshot.data();

    stopPlayback();

    pattern = data.pattern || [];
    document.getElementById("exerciseName").value = data.name || "";
    document.getElementById("tempo").value = data.tempo || 90;

    metronomeOn = data.metronomeOn ?? true;
    countInOn = data.countInOn ?? true;

    document.getElementById("metroBtn").classList.toggle("on", metronomeOn);
    document.getElementById("metroBtn").textContent = metronomeOn ? "Metronome On" : "Metronome Off";

    document.getElementById("countBtn").classList.toggle("on", countInOn);
    document.getElementById("countBtn").textContent = countInOn ? "4 Count In On" : "4 Count In Off";

    renderBuildArea();
    renderStaff();
};

window.deleteSelectedExercise = async function() {
    const id = savedExercises.value;

    if (!id) {
        alert("Please select a saved exercise.");
        return;
    }

    const confirmed = confirm("Delete this saved exercise?");
    if (!confirmed) return;

    await deleteDoc(doc(db, "vocalWarmupExercises", id));

    savedExercises.value = "";
    await loadExerciseList();

    alert("Exercise deleted.");
};

renderStaff();
loadExerciseList();
</script>

</body>
</html>
